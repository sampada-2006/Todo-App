<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="ToDoApp.css">
</head>
<body>
    <h1 id="main-heading">To Do App</h1>

    <script src="ToDoApp.js"></script>
</body>
</html>
